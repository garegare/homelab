services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=homelab_user
      - DB_POSTGRESDB_PASSWORD=${DB_POSTGRESDB_PASSWORD}
      - N8N_HOST=${N8N_HOSTNAME} # Using hostname from .env
      - N8N_PORT=5678
      - N8N_PROTOCOL=http # Changed to http for local network
      - NODE_ENV=production
      - WEBHOOK_URL=http://${N8N_HOSTNAME}/
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME}
    volumes:
      - ./data:/home/node/.n8n
    networks:
      - homelab-net

networks:
  homelab-net:
    external: true
